steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t',
      '$_AR_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/ecotrace:$COMMIT_SHA',
      '.'
    ]

  # Step 2: Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      '$_AR_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/ecotrace:$COMMIT_SHA'
    ]

  # Step 3: Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run',
      'deploy',
      'ecotrace',
      '--image',
      '$_AR_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/ecotrace:$COMMIT_SHA',
      '--region',
      '$_RUN_REGION',
      '--platform',
      'managed',
      '--allow-unauthenticated'
    ]

images:
  - '$_AR_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/ecotrace:$COMMIT_SHA'

substitutions:
  _AR_REGION: 'us-central1'
  _AR_REPO: 'ecotrace-repo'
  _RUN_REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
